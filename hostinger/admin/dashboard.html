<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Filiação digital SINTEENPPB-PB — Sindicato dos Trabalhadores em Empresas de Energia Elétrica">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#1a3a5c">
  <link rel="icon" type="image/jpeg" href="/logo/faviSinteenp.jpeg">
  <link rel="stylesheet" href="../css/admin/admin.css">
  <link rel="stylesheet" href="../css/admin/dashboard.css">
  <title>Dashboard - CRM Filiação Sindical</title>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="header-title">
        <h1>Dashboard</h1>
        <span>ADMIN</span>
      </div>
      <div class="header-actions">
        <a href="novo.html" class="btn btn-primary">+ Novo Sócio</a>
        <a href="financeiro.html" class="btn btn-secondary">Financeiro</a>
        <button id="btn-logout" class="btn btn-danger">Sair</button>
      </div>
    </div>
  </header>

  <div class="container">
    <div id="alerta" class="alert"></div>

    <div class="stats" id="estatisticas">
      <div class="stat-card">
        <div class="stat-value">-</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card pendente">
        <div class="stat-value">-</div>
        <div class="stat-label">Pendentes</div>
      </div>
      <div class="stat-card aprovado">
        <div class="stat-value">-</div>
        <div class="stat-label">Aprovados</div>
      </div>
      <div class="stat-card recusado">
        <div class="stat-value">-</div>
        <div class="stat-label">Recusados</div>
      </div>
    </div>

    <div class="filters">
      <div class="filter-group">
        <label for="filtro-status">Status</label>
        <select id="filtro-status">
          <option value="">Todos</option>
          <option value="pendente">Pendente</option>
          <option value="aprovado">Aprovado</option>
          <option value="recusado">Recusado</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="filtro-pagamento">Forma de Pagamento</label>
        <select id="filtro-pagamento">
          <option value="">Todos</option>
          <option value="folha">Folha de Pagamento</option>
          <option value="direto">Pagamento Direto</option>
        </select>
      </div>

      <div class="filter-group">
        <label for="busca">Buscar por Nome ou CPF</label>
        <input type="text" id="busca" placeholder="Nome ou CPF...">
      </div>

      <div class="filter-actions">
        <button id="btn-filtrar" class="btn-filter">Filtrar</button>
        <button id="btn-limpar-filtros" class="btn-limpar">Limpar</button>
      </div>
    </div>

    <div class="table-wrapper">
      <div id="carregando" class="loading" style="display: none;">
        <span class="spinner"></span>Carregando dados...
      </div>

      <div id="vazio" class="empty-state" style="display: none;">
        <h3>Nenhum sócio encontrado</h3>
        <p>Tente ajustar seus filtros ou adicionar novos sócios</p>
      </div>

      <table id="tabela-socios" style="display: none;">
        <thead>
          <tr>
            <th>Nome</th>
            <th>CPF</th>
            <th>Empresa</th>
            <th>Status</th>
            <th>Pagamento</th>
            <th>Adimplência</th>
            <th>Data de Filiação</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="lista-socios"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { supabase } from '../js/supabase.js'
    import { protegerRota, fazerLogout, exibirAlerta, formatarMensagemErro } from '../js/admin/auth.js'
    import { carregarSocios, calcularEstatisticas, mascararCPF } from '../js/admin/dashboard.js'

    // Guard de autenticação
    await protegerRota(supabase)

    const btnLogout = document.getElementById('btn-logout')
    const btnFiltrar = document.getElementById('btn-filtrar')
    const btnLimparFiltros = document.getElementById('btn-limpar-filtros')
    const filtroStatus = document.getElementById('filtro-status')
    const filtroPagamento = document.getElementById('filtro-pagamento')
    const busca = document.getElementById('busca')
    const carregando = document.getElementById('carregando')
    const vazio = document.getElementById('vazio')
    const tabela = document.getElementById('tabela-socios')
    const tbody = document.getElementById('lista-socios')
    const alerta = document.getElementById('alerta')
    const estatisticas = document.getElementById('estatisticas')

    // Logout
    btnLogout.addEventListener('click', async () => {
      try {
        await fazerLogout(supabase)
      } catch (error) {
        exibirAlerta(alerta, formatarMensagemErro(error), 'error')
      }
    })

    // Carregar dados iniciais
    async function atualizarDados() {
      try {
        carregando.style.display = 'block'
        vazio.style.display = 'none'
        tabela.style.display = 'none'

        const filtros = {
          status: filtroStatus.value || null,
          forma_pagamento: filtroPagamento.value || null,
          busca: busca.value.trim() || null
        }

        const { socios, total, pendentes, aprovados, recusados } = await carregarSocios(supabase, filtros)

        // Atualizar estatísticas
        const stats = estatisticas.querySelectorAll('.stat-value')
        stats[0].textContent = total
        stats[1].textContent = pendentes
        stats[2].textContent = aprovados
        stats[3].textContent = recusados

        // Montar tabela
        if (socios.length === 0) {
          vazio.style.display = 'block'
          carregando.style.display = 'none'
          return
        }

        tbody.innerHTML = socios.map(socio => `
          <tr>
            <td>${socio.nome_completo}</td>
            <td class="cpf-masked">${mascararCPF(socio.cpf)}</td>
            <td>${socio.empresa || '-'}</td>
            <td>
              <span class="status-badge status-${socio.status}">
                ${socio.status === 'pendente' ? 'Pendente' : 
                  socio.status === 'aprovado' ? 'Aprovado' : 'Recusado'}
              </span>
            </td>
            <td>${socio.forma_pagamento === 'folha' ? 'Folha' : 'Direto'}</td>
            <td>
              <span class="status-badge ${socio.adimplente !== false ? 'status-aprovado' : 'status-recusado'}">
                ${socio.adimplente !== false ? '✓ Adimplente' : '✗ Inadimplente'}
              </span>
            </td>
            <td>${new Date(socio.data_filiacao).toLocaleDateString('pt-BR')}</td>
            <td class="actions-cell">
              <a href="detalhe.html?id=${socio.id}" class="btn-small btn-view">Ver Detalhes</a>
            </td>
          </tr>
        `).join('')

        tabela.style.display = 'table'
        carregando.style.display = 'none'
      } catch (error) {
        carregando.style.display = 'none'
        exibirAlerta(alerta, formatarMensagemErro(error), 'error')
      }
    }

    // Event listeners
    btnFiltrar.addEventListener('click', atualizarDados)
    btnLimparFiltros.addEventListener('click', () => {
      filtroStatus.value = ''
      filtroPagamento.value = ''
      busca.value = ''
      atualizarDados()
    })

    // Enter na busca
    busca.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') atualizarDados()
    })

    // Carregar dados ao abrir página
    atualizarDados()
  </script>
</body>
</html>
